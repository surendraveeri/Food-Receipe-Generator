<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Food Item - FoodSaver</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fb; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    nav.navbar { background: linear-gradient(90deg, #43cea2, #185a9d); }
    .card { max-width: 720px; margin: 60px auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 6px 18px rgba(0,0,0,0.06); }
    .btn-submit { background: linear-gradient(90deg, #185a9d, #43cea2); color: white; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container-fluid">
      <a class="navbar-brand" href="/foodtracker">🥗 FoodSaver</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/myitems">My Items</a></li>
      </ul>
    </div>
  </nav>

  <div class="card">
    <h3 class="mb-4">Add New Food Item</h3>

    <form id="addItemForm">
      <div class="mb-3">
        <label for="name" class="form-label">Item Name</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="Enter food name" required>
      </div>

      <div class="mb-3">
        <label for="category" class="form-label">Category</label>
        <input type="text" class="form-control" id="category" name="category" placeholder="e.g., Vegetable, Dairy">
      </div>

      <div class="mb-3">
        <label for="quantity" class="form-label">Quantity</label>
        <input type="number" class="form-control" id="quantity" name="quantity" placeholder="Enter quantity" min="1" required>
      </div>

      <div class="mb-3">
        <label for="expiry_date" class="form-label">Expiry Date</label>
        <input type="date" class="form-control" id="expiry_date" name="expiry_date" required>
      </div>

      <div class="mb-3">
        <label for="notes" class="form-label">Notes (Optional)</label>
        <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Add any notes or reminders"></textarea>
      </div>

      <button type="submit" class="btn btn-submit btn-lg">Add Item</button>
    </form>
  </div>

  <script>
    function generateUniqueCode(length = 6) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let code = 'FS-';
      for (let i = 0; i < length; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
      return code;
    }

    document.getElementById('addItemForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const category = document.getElementById('category').value.trim();
      const quantity = document.getElementById('quantity').value;
      const expiry = document.getElementById('expiry_date').value;
      const notes = document.getElementById('notes').value.trim();

      if (!name || !quantity || !expiry) {
        alert('Please fill Name, Quantity, and Expiry Date.');
        return;
      }

      const item = {
        name,
        category,
        quantity: Number(quantity),
        expiry,
        notes,
        code: generateUniqueCode()
      };

      const existing = JSON.parse(localStorage.getItem('foodItems')) || [];
      existing.push(item);
      localStorage.setItem('foodItems', JSON.stringify(existing));

      alert(`✅ Added: ${item.name}\nCode: ${item.code}`);
      this.reset();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
