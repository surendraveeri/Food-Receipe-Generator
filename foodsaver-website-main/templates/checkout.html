<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - FoodSaver</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f7f8fa; }
    .navbar { background: linear-gradient(90deg, #43cea2, #185a9d); }
    .btn-confirm { background: linear-gradient(90deg,#43cea2,#185a9d); color: white; border: none; border-radius: 6px; padding: 10px 20px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container-fluid">
      <a class="navbar-brand" href="/foodtracker">🥗 FoodSaver</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/myitems">My Items</a></li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="text-center mb-3">Checkout</h2>
    <table class="table table-striped table-hover">
      <thead class="table-success">
        <tr><th>Name</th><th>Quantity</th><th>Expiry</th><th>Item Code</th></tr>
      </thead>
      <tbody id="checkout-body"></tbody>
    </table>
    <h4 id="total-items" class="text-center mt-3"></h4>
    <div class="text-center mt-4">
      <button class="btn btn-confirm" onclick="confirmOrder()">Confirm Order</button>
      <h5 id="order-id" class="text-primary mt-3"></h5>
    </div>
  </div>

  <script>
    function generateOrderId() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      let order = 'ORD-FS-';
      for (let i = 0; i < 6; i++) order += chars.charAt(Math.floor(Math.random() * chars.length));
      return order;
    }

    function loadCheckout() {
      const items = JSON.parse(localStorage.getItem('foodItems')) || [];
      const body = document.getElementById('checkout-body');
      body.innerHTML = '';
      if (items.length === 0) {
        body.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No items in cart.</td></tr>`;
        document.getElementById('total-items').innerText = '';
        return;
      }
      items.forEach(item => {
        body.innerHTML += `
          <tr>
            <td>${item.name}</td>
            <td>${item.quantity}</td>
            <td>${item.expiry}</td>
            <td>${item.code}</td>
          </tr>`;
      });
      document.getElementById('total-items').innerText = 'Total Items: ' + items.length;
    }

    function confirmOrder() {
      const items = JSON.parse(localStorage.getItem('foodItems')) || [];
      if (items.length === 0) { alert('No items to checkout!'); return; }
      const orderId = generateOrderId();
      document.getElementById('order-id').innerText = 'Your Order ID: ' + orderId;
      alert('Order confirmed! ID: ' + orderId);
      localStorage.removeItem('foodItems');
      loadCheckout();
    }

    loadCheckout();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
