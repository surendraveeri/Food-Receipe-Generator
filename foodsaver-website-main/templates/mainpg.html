<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FoodSaver</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1567306226416-28f0efdc88ce?auto=format&fit=crop&w=1600&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
    }

    .login-container {
      max-width: 400px;
      margin: 80px auto;
      background: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #43cea2;
    }

    .btn-primary {
      background: linear-gradient(90deg, #43cea2, #185a9d);
      border: none;
    }

    .btn-primary:hover {
      background: linear-gradient(90deg, #185a9d, #43cea2);
    }

    .form-control:focus {
      box-shadow: 0 0 5px #43cea2;
      border-color: #43cea2;
    }

    .login-footer {
      text-align: center;
      margin-top: 15px;
    }

    .login-footer a {
      color: #185a9d;
      text-decoration: none;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }

    .message-box {
      text-align: center;
      margin-top: 20px;
      font-weight: 600;
      color: green;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>🥗 FoodSaver Login</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <div class="login-footer">
      <p>Don't have an account? <a href="#">Sign Up</a></p>
      <p><a href="#">Forgot Password?</a></p>
    </div>
    <div id="message" class="message-box"></div>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const messageBox = document.getElementById('message');

    loginForm.addEventListener('submit', function(e) {
      e.preventDefault(); // Prevent form submission

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Display success message and entered details
      messageBox.innerHTML = `✅ Login successful! <br> Email: ${email} <br> Password: ${password}`;
      
      // Optionally, you can clear the form
      // loginForm.reset();
    });
  </script>
</body>
</html>
