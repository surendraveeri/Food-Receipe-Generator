<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Food Items - FoodSaver</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .navbar { background: linear-gradient(90deg, #43cea2, #185a9d); }
    .btn-checkout { background: linear-gradient(90deg, #43cea2, #185a9d); border: none; color: white; font-weight: 600; border-radius: 8px; padding: 10px 20px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container-fluid">
      <a class="navbar-brand" href="/foodtracker">🥗 FoodSaver</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/additems">Add Items</a></li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    <h2 class="text-center mb-3">Saved Food Items</h2>
    <div class="table-container">
      <table class="table table-striped table-hover shadow-sm bg-white rounded">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Item Code</th>
            <th>Expiry</th>
            <th>Remove</th>
          </tr>
        </thead>
        <tbody id="saved-items-body"></tbody>
      </table>
    </div>

    <div class="text-center mt-4">
      <a href="/checkout" class="btn btn-checkout"><i class="bi bi-cart-check-fill"></i> Go to Checkout</a>
    </div>
  </div>

  <script>
    function renderSavedItems() {
      const savedItems = JSON.parse(localStorage.getItem('foodItems')) || [];
      const tbody = document.getElementById('saved-items-body');
      tbody.innerHTML = '';

      if (savedItems.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted">No items saved yet.</td></tr>`;
        return;
      }

      savedItems.forEach((item, index) => {
        tbody.innerHTML += `
          <tr>
            <td>${item.name}</td>
            <td>${item.category || '-'}</td>
            <td>${item.quantity}</td>
            <td>${item.code}</td>
            <td>${item.expiry}</td>
            <td><button class="btn btn-sm btn-danger" onclick="removeItem(${index})">Remove</button></td>
          </tr>`;
      });
    }

    function removeItem(index) {
      const savedItems = JSON.parse(localStorage.getItem('foodItems')) || [];
      savedItems.splice(index, 1);
      localStorage.setItem('foodItems', JSON.stringify(savedItems));
      renderSavedItems();
    }

    renderSavedItems();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
