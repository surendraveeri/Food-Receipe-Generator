<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Inventory - FoodSaver</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<!-- EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3.2.0/dist/email.min.js"></script>
<script>
  (function(){
    emailjs.init("ZuyvP3M6IdrBcYX1K"); // <-- Replace with your EmailJS Public Key
  })();
</script>
<style>
body {
  background: url("https://images.unsplash.com/photo-1606788075761-7c8b8b8b7b8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80") no-repeat center center fixed;
  background-size: cover;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #333;
}
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255, 255, 255, 0.7);
  z-index: -1;
}
nav.navbar {
  background: linear-gradient(90deg, #43cea2, #185a9d);
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
nav a.nav-link, nav .navbar-brand {
  color: white !important;
  font-weight: 600;
}
nav a.nav-link:hover {
  color: #ffe066 !important;
}
.container {
  margin-top: 20px;
  margin-bottom: 50px;
  max-width: 900px;
}
.table th, .table td {
  vertical-align: middle;
}
.expired {
  background-color: #f8d7da !important;
  color: #842029 !important;
}
.near-expiry {
  background-color: #fff3cd !important;
  color: #856404 !important;
}
.footer {
  background: #185a9d;
  color: white;
  text-align: center;
  padding: 20px 0;
  margin-top: 50px;
}
.footer a {
  color: white;
  margin: 0 10px;
  font-size: 1.5rem;
  transition: color 0.3s;
}
.footer a:hover {
  color: #43cea2;
}
.email-box {
  max-width: 400px;
  margin: 20px auto;
  background: rgba(255,255,255,0.85);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.home-icon {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 2rem;
  color: white;
  cursor: pointer;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
}
</style>
</head>
<body>

<!-- Home Icon -->
<a href="/" class="home-icon" title="Go to Home"><i class="bi bi-house-fill"></i></a>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🥗 FoodSaver</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/mainpg">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="/additems">Add Item</a></li>
        <li class="nav-item"><a class="nav-link" href="/smartrecipes">Recipes</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Email Input Box -->
<div class="email-box text-center">
  <h5>Enter your email for expiry notifications:</h5>
  <div class="input-group mb-3">
    <input type="email" id="userEmailInput" class="form-control" placeholder="Enter your email">
    <button class="btn btn-primary" onclick="setUserEmail()">Set Email</button>
  </div>
  <!-- Message will appear here -->
  <p id="emailMessage" class="text-success mt-2"></p>
  <!-- Back to home button -->
  <a href="/foodtracker" class="btn btn-secondary mt-2"><i class="bi bi-house-fill"></i> Back to Home</a>
</div>

<!-- Inventory Table -->
<div class="container">
  <h2 class="mb-4 text-center">Food Inventory</h2>
  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Item</th>
        <th>Category</th>
        <th>Quantity</th>
        <th>Expiry Date</th>
        <th>Days Left</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="inventoryBody">
      <!-- Rows added dynamically -->
    </tbody>
  </table>
</div>

<!-- Footer -->
<div class="footer">
  <p>Contact us: <a href="mailto:foodsaver@support.com">foodsaver@support.com</a></p>
  <div>
    <a href="https://www.facebook.com" target="_blank"><i class="bi bi-facebook"></i></a>
    <a href="https://www.instagram.com" target="_blank"><i class="bi bi-instagram"></i></a>
    <a href="https://www.twitter.com" target="_blank"><i class="bi bi-twitter"></i></a>
  </div>
  <p class="mt-2 mb-0">&copy; 2011-2025 All rights reserved</p>
</div>

<script>
let inventoryData = [
  { item: 'Apple', category: 'Fruit', quantity: 5, expiry: '2025-09-28' },
  { item: 'GoodDay', category: 'Snack', quantity: 10, expiry: '2025-09-30' },
  { item: 'Orange', category: 'Fruit', quantity: 3, expiry: '2025-10-04' }
];

const inventoryBody = document.getElementById('inventoryBody');
const NEAR_EXPIRY_THRESHOLD = 3;
let userEmail = ""; // Will be set from email input

function setUserEmail() {
  const emailInput = document.getElementById('userEmailInput').value.trim();
  const emailMessage = document.getElementById('emailMessage');

  if(emailInput) {
    userEmail = emailInput;
    emailMessage.textContent = `Email set to ${userEmail} for notifications!`;
    emailMessage.classList.remove('text-danger');
    emailMessage.classList.add('text-success');
    renderTable(); // Re-render to send notifications if needed
  } else {
    emailMessage.textContent = "Please enter a valid email!";
    emailMessage.classList.remove('text-success');
    emailMessage.classList.add('text-danger');
  }
}

function calculateDaysLeft(expiry) {
  const today = new Date();
  const expiryDate = new Date(expiry);
  return Math.ceil((expiryDate - today) / (1000*60*60*24));
}

function sendEmailNotification(itemName, daysLeft, email) {
  if(!email) return;
  emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
    to_email: email,
    item_name: itemName,
    days_left: daysLeft
  }).then(function(response){
    console.log('Email sent successfully!', response.status, response.text);
  }, function(error){
    console.error('Email sending failed:', error);
  });
}

function renderTable() {
  inventoryBody.innerHTML = '';
  inventoryData.forEach((item, index) => {
    const daysLeft = calculateDaysLeft(item.expiry);
    const tr = document.createElement('tr');

    if(daysLeft < 0) tr.classList.add('expired');
    else if(daysLeft <= NEAR_EXPIRY_THRESHOLD) tr.classList.add('near-expiry');

    tr.innerHTML = `
      <td>${item.item}</td>
      <td>${item.category}</td>
      <td>${item.quantity}</td>
      <td>${item.expiry}</td>
      <td>${daysLeft < 0 ? `Expired ${Math.abs(daysLeft)} days ago` : `${daysLeft} days left`}</td>
      <td>
        <button class="btn btn-outline-primary btn-sm me-1" onclick="viewRecipes('${item.item}')">Recipes</button>
        <button class="btn btn-outline-danger btn-sm" onclick="deleteItem(${index})"><i class="bi bi-trash"></i></button>
      </td>
    `;
    inventoryBody.appendChild(tr);

    // Send email notification if near expiry
    if(daysLeft > 0 && daysLeft <= NEAR_EXPIRY_THRESHOLD) {
      sendEmailNotification(item.item, daysLeft, userEmail);
    }
  });
}

function viewRecipes(itemName) {
  alert(`Show recipes for ${itemName}`);
}

function deleteItem(index) {
  inventoryData.splice(index, 1);
  renderTable();
}

// Initial render
renderTable();
</script>

</body>
</html>
